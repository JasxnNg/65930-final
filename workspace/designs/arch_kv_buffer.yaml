# Norm Jouppi, George Kurian, Sheng Li, Peter Ma, Rahul Nagarajan, Lifeng Nai, Nishant
# Patil, Suvinay Subramanian, Andy Swing, Brian Towles, Clifford Young, Xiang Zhou,
# Zongwei Zhou, and David A Patterson. 2023. TPU v4: An Optically Reconfigurable
# Supercomputer for Machine Learning with Hardware Support for Embeddings. In
# Proceedings of the 50th Annual International Symposium on Computer Architecture (ISCA
# '23). Association for Computing Machinery, New York, NY, USA, Article 82, 1–14.
# https://doi.org/10.1145/3579371.3589350
#
# Speculative-decoding-aware variant:
# - Adds a dedicated read-optimized KV cache buffer for K/V tensors.
# - Adds an optional speculative verify fanout in the PE array.

{% set VERIFY_FANOUT = VERIFY_FANOUT | default(4) %}
{% set KV_CACHE_BUFFER_SIZE = KV_CACHE_BUFFER_SIZE | default(1024*1024*128*8) %}
{% set KV_CACHE_READ_ENERGY = KV_CACHE_READ_ENERGY | default(0.40e-12) %}
{% set KV_CACHE_WRITE_ENERGY = KV_CACHE_WRITE_ENERGY | default(0.55e-12) %}
{% set KV_CACHE_READ_BW = KV_CACHE_READ_BW | default(4096e9) %}
{% set KV_CACHE_WRITE_BW = KV_CACHE_WRITE_BW | default(1024e9) %}
{% set KV_CACHE_AREA = KV_CACHE_AREA | default(28e-6) %}

arch:
  nodes:
  - !Memory
    name: MainMemory
    size: inf
    leak_power: 0
    area: 0 # Don't include off-chip DRAM area
    actions:
      # Upper end of the range from the TPU paper. The lower end came from their
      # reference, and they said it left out some things.
    - {name: read, energy: 7.03e-12, latency: 1 / (8 * 614e9)}
    - {name: write, energy: 7.03e-12, latency: 1 / (8 * 614e9)}
    tensors: {keep: ~Intermediates, may_keep: All - QK_softmax - Q_new - K}

  - !Memory
    name: GlobalBuffer
    size: 1024*1024*128*8 # 128MB
    total_latency: max(read_latency, write_latency) # Separate ports
    leak_power: 0
    area: 112e-6 # From paper fig. 6
    actions:
    - {name: read, energy: 1.88e-12, latency: 1 / (8 * 2048e9)}
    - {name: write, energy: 2.36e-12, latency: 1 / (8 * 1024e9)}
    tensors: {keep: ~MainMemory.tensors, may_keep: All - K - V}

  - !Memory
    name: KVCacheBuffer
    size: {{KV_CACHE_BUFFER_SIZE}} # 128MB default, was previously 32MB 
    total_latency: max(read_latency, write_latency) # Separate ports
    leak_power: 0
    area: {{KV_CACHE_AREA}}
    actions:
    - {name: read, energy: {{KV_CACHE_READ_ENERGY}}, latency: 1 / (8 * {{KV_CACHE_READ_BW}})}
    - {name: write, energy: {{KV_CACHE_WRITE_ENERGY}}, latency: 1 / (8 * {{KV_CACHE_WRITE_BW}})}
    tensors: {keep: K | V, may_keep: K | V}

  - !Memory
    name: LocalBuffer
    spatial: [{name: Z, fanout: 4, may_reuse: Nothing, min_usage: 1}]
    size: 1024*1024*4*8 # 4MB
    leak_power: 0
    area: 51e-6 # From paper fig. 6
    actions:
    - {name: read, energy: 0.249e-12, latency: 0}
    - {name: write, energy: 0.293e-12, latency: 0}
    tensors: {keep: input | output}

  - !Compute
    name: ScalarUnit
    area: 8.7e-6 # From die photo.
    leak_power: 0
    actions:
    - {name: compute, energy: 0, latency: 1 / 1.05e9 / 128}
    enabled: len(All) == 2

  - !Container
    name: ProcessingElement
    spatial:
    - {name: verify_m, fanout: {{VERIFY_FANOUT}}, may_reuse: weight, reuse: weight, min_usage: 0.0, power_gateable: True}
    - {name: reuse_input, fanout: 128, may_reuse: input, reuse: input, min_usage: 1}
    - {name: reuse_output, fanout: 128, may_reuse: output, reuse: output, min_usage: 1}

  - !Memory
    name: Register
    size: weight.bits_per_value if weight else 0
    area: 8.5e-11 # Fig. 6 has 14mm^2 for a 128x128. Assume regs are 10%.
    leak_power: 0
    actions:
    - {name: read, energy: 0, latency: 0}
    - {name: write, energy: 0, latency: 0}
    tensors: {keep: weight}

  - !Compute
    name: MAC
    leak_power: 0
    area: 8.5e-10 # Fig. 6 has 14mm^2 for a 128x128. Assume MAC is 90%.
    actions:
    - {name: compute, energy: 0.084e-12, latency: 1 / 1.05e9}
    enabled: len(All) == 3
